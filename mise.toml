[tools]
rust = "latest"
# node/npm for the UI (Vite) — provided by mise so `mise run dev` works without
# relying on a node install from the surrounding shell.
node = "22"
# File-watcher used by the dev tasks to rebuild+restart the backend on change.
watchexec = "latest"

# ---------------------------------------------------------------------------
# Local development
#
#   mise run dev           UI hot-reload + backend auto-restart together
#   mise run dev-ui        UI only (Vite HMR on :5173)
#   mise run dev-api       backend only (:4400, rebuild+restart on Rust changes)
#   mise run dev-worker    BYOW worker against the local server (run alongside `dev`)
#   mise run stage-plugins build + stage plugins/* bundles into target/debug/plugins
#
# The dev tasks depend on stage-plugins, so http.request (and any other plugin
# bundle) is present in the default plugins-dir.
#
# Open http://localhost:5173 — the Vite dev server hot-reloads the UI in place
# and proxies /api to the backend on :4400. UI edits apply instantly (HMR);
# Rust is compiled, so backend edits trigger an incremental recompile and a
# server restart (a few seconds) — the closest thing to HMR the backend can do.
# Dev state lives in ./.dev (gitignored), never ~/.orchestrator.
#
# `dev-worker` needs a server that accepts the worker token, so run it next to
# `dev` (which serves with `--worker-token s3cret`), not `dev-api` (no token).
# It serves the `gpu`/`test` queues: give a flow `queue: gpu` (or `test`) and it
# executes on the worker instead of the server. Visible under Workers in the UI.
# ---------------------------------------------------------------------------

[tasks.stage-plugins]
description = "Build and stage every plugin bundle (plugins/*) into target/debug/plugins"
run = """
cargo build --workspace --bins
dest="target/debug/plugins"
# Any plugins/<name>/ with a plugin.json is a bundle. plugins/sdk is a library
# (no plugin.json) and is skipped automatically.
for pj in plugins/*/plugin.json; do
  [ -e "$pj" ] || continue
  name=$(basename "$(dirname "$pj")")
  entrypoint=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['entrypoint'])" "$pj")
  mkdir -p "$dest/$name"
  cp "$pj" "$dest/$name/plugin.json"
  if [ -f "target/debug/$entrypoint" ]; then
    cp "target/debug/$entrypoint" "$dest/$name/$entrypoint"   # Rust plugin crate
  elif [ -f "plugins/$name/$entrypoint" ]; then
    cp "plugins/$name/$entrypoint" "$dest/$name/$entrypoint"  # prebuilt/script bundle
  else
    echo "stage-plugins: entrypoint '$entrypoint' for plugin '$name' not found" >&2
    exit 1
  fi
  echo "staged $name"
done
"""

[tasks.dev]
description = "Local dev: UI hot-reload + backend auto-restart (open http://localhost:5173)"
depends = ["stage-plugins"]
env = { RUST_LOG = "info,orchestrator=debug" }
run = """
mkdir -p .dev
trap 'kill 0' EXIT
watchexec --restart --stop-signal SIGINT --watch src --watch Cargo.toml --exts rs,toml -- \
  cargo run -- serve --db .dev/dev.db --key .dev/dev.key --worker-token s3cret &
(cd ui && npm install && npm run dev) &
wait
"""

[tasks.dev-api]
description = "Backend only on :4400 — recompiles + restarts on Rust source changes"
depends = ["stage-plugins"]
env = { RUST_LOG = "info,orchestrator=debug" }
run = """
mkdir -p .dev
watchexec --restart --stop-signal SIGINT --watch src --watch Cargo.toml --exts rs,toml -- \
  cargo run -- serve --db .dev/dev.db --key .dev/dev.key
"""

[tasks.dev-ui]
description = "UI only — Vite HMR on http://localhost:5173 (proxies /api to :4400)"
dir = "ui"
run = "npm install && npm run dev"

[tasks.dev-worker]
description = "BYOW worker connected to the local dev server (serves the gpu/test queues)"
depends = ["stage-plugins"]
env = { RUST_LOG = "info,orchestrator=debug" }
run = """
mkdir -p .dev
watchexec --restart --stop-signal SIGINT --watch src --watch Cargo.toml --exts rs,toml -- \
  cargo run -- worker \
    --server http://localhost:4400 \
    --token s3cret \
    --id dev-worker \
    --queues gpu,test \
    --db .dev/worker.db --key .dev/worker.key
"""
